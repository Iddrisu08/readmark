<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --surface: #181a23; --surface-hover: #1e2130;
      --text: #e4e5ea; --text2: #8b8d9a; --muted: #5a5c6a;
      --border: #2a2d3a; --accent: #c084fc; --accent-hover: #a855f7;
      --unread: #64748b; --reading: #f59e0b; --done: #22c55e;
      --input-bg: #1a1c28; --danger: #ef4444;
    }
    .light {
      --bg: #f8f7f4; --surface: #ffffff; --surface-hover: #f5f4f1;
      --text: #1a1a2e; --text2: #6b7280; --muted: #9ca3af;
      --border: #e5e5e0; --accent: #7c3aed; --accent-hover: #6d28d9;
      --unread: #94a3b8; --reading: #d97706; --done: #16a34a;
      --input-bg: #f3f3ef; --danger: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      width: 360px; min-height: 200px;
    }
    input, textarea, select, button { font-family: inherit; }
    a { color: var(--accent); text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ────────────── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(192,132,252,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-family: 'Source Serif 4', serif; font-size: 16px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 4px; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); }

    /* ── Auth ────────────── */
    .auth-view { padding: 20px 14px; }
    .auth-title {
      font-family: 'Source Serif 4', serif;
      font-size: 14px; font-weight: 600; margin-bottom: 12px; text-align: center;
    }
    .auth-tabs { display: flex; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .auth-tab {
      flex: 1; padding: 7px; text-align: center;
      background: transparent; border: none; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer;
    }
    .auth-tab.active { background: var(--accent); color: white; font-weight: 600; }
    .field { margin-bottom: 8px; }
    .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 3px; font-weight: 500; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 7px 10px; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 12px; color: var(--text);
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 8px; background: var(--accent); color: white;
      border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger); padding: 6px 10px; border-radius: 4px;
      font-size: 11px; margin-bottom: 8px; display: none;
    }
    .error-msg.visible { display: block; }
    .server-url-hint {
      font-size: 10px; color: var(--muted); text-align: center;
      margin-top: 10px; line-height: 1.4;
    }

    /* ── Save View ────────── */
    .save-view { padding: 10px 14px 14px; }
    .page-info {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 10px;
    }
    .page-favicon { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
    .page-title {
      font-size: 12px; font-weight: 500; line-height: 1.3;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .already-saved {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border-radius: 6px; margin-bottom: 10px;
      font-size: 11px; font-weight: 500;
    }
    .already-saved.yes {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--done);
    }
    .already-saved.no {
      background: rgba(192,132,252,0.08); border: 1px solid rgba(192,132,252,0.2); color: var(--accent);
    }
    .form-row { display: flex; gap: 6px; }
    .form-row .field { flex: 1; }

    /* ── Recent Items ────── */
    .recent-section { padding: 0 14px 14px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .recent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      transition: background 0.1s;
    }
    .recent-item:hover { background: var(--surface-hover); }
    .status-dot { font-size: 12px; flex-shrink: 0; }
    .recent-title { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recent-meta { font-size: 10px; color: var(--muted); flex-shrink: 0; }

    /* ── User bar ──────── */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }
    .logout-btn {
      background: none; border: none; color: var(--danger);
      font-size: 11px; cursor: pointer; font-weight: 500;
    }
    .dashboard-link {
      font-size: 11px; color: var(--accent); cursor: pointer;
      background: none; border: none; font-weight: 500;
    }

    /* ── Utility ──────── */
    .hidden { display: none !important; }
    .toast {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: white; padding: 6px 16px;
      border-radius: 6px; font-size: 12px; font-weight: 500;
      z-index: 100; animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
