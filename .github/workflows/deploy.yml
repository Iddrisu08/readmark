name: Deploy

# Build the image, push to ECR, then tell the EC2 instance to pull & restart
# via SSM (no SSH). Runs after code changes land on main.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'readmark' }}

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy on EC2 via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=${ECR_REPOSITORY}-app" \
            --parameters 'commands=["/usr/local/bin/readmark-deploy.sh"]' \
            --comment "Deploy ${{ github.sha }}" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --region "$AWS_REGION" \
            --command-id "$CMD_ID" \
            --instance-id "$(aws ec2 describe-instances --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${ECR_REPOSITORY}-app" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text)" || true
          echo "Deploy dispatched."
