name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest requests

      - name: Lint (ruff — errors only)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Start app
        env:
          SECRET_KEY: ci-test-secret
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/api/health && break
            sleep 1
          done

      - name: Integration tests
        env:
          READMARK_TEST_URL: http://127.0.0.1:8000/api
        run: pytest test_readmark.py -v
