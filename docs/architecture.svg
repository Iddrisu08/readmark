<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .card{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:1.5;rx:10;}
      .ec2{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;}
      .ext{fill:#fff7ed;stroke:#fb923c;stroke-width:1.5;stroke-dasharray:5 3;}
      .awsbox{fill:none;stroke:#ff9900;stroke-width:1.5;stroke-dasharray:6 4;}
      .t{fill:#0f172a;font-size:15px;font-weight:600;}
      .s{fill:#475569;font-size:12px;}
      .lbl{fill:#64748b;font-size:11px;}
      .h{fill:#0f172a;font-size:22px;font-weight:700;}
      .edge{stroke:#94a3b8;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="560" fill="#ffffff"/>
  <text x="34" y="42" class="h">ReadMark — AWS Deployment</text>
  <text x="34" y="64" class="s">Terraform (IaC) · GitHub Actions (CI/CD) · Docker on EC2 · CloudWatch · Anthropic Claude</text>

  <!-- Developer + Users -->
  <rect class="card" x="30" y="120" width="120" height="52" rx="10"/>
  <text x="90" y="151" class="t" text-anchor="middle">Developer</text>

  <rect class="card" x="30" y="452" width="120" height="52" rx="10"/>
  <text x="90" y="483" class="t" text-anchor="middle">Users</text>

  <!-- GitHub Actions -->
  <rect class="card" x="195" y="95" width="255" height="205" rx="10"/>
  <text x="322" y="120" class="t" text-anchor="middle">GitHub Actions</text>
  <rect x="213" y="135" width="219" height="32" rx="7" fill="#e2e8f0"/>
  <text x="223" y="156" class="s">CI · ruff lint + pytest</text>
  <rect x="213" y="173" width="219" height="32" rx="7" fill="#e2e8f0"/>
  <text x="223" y="194" class="s">Deploy · build → ECR → SSM</text>
  <rect x="213" y="211" width="219" height="32" rx="7" fill="#e2e8f0"/>
  <text x="223" y="232" class="s">Terraform · fmt / validate / plan</text>
  <rect x="213" y="249" width="219" height="32" rx="7" fill="#e2e8f0"/>
  <text x="223" y="270" class="s">Infracost · cost estimate</text>

  <!-- ECR -->
  <rect class="card" x="195" y="330" width="255" height="50" rx="10"/>
  <text x="322" y="360" class="t" text-anchor="middle">Amazon ECR</text>

  <!-- AWS box -->
  <rect class="awsbox" x="500" y="90" width="470" height="340" rx="12"/>
  <text x="516" y="112" fill="#b45309" font-size="13" font-weight="700">AWS · us-east-1</text>

  <!-- EC2 -->
  <rect class="ec2" x="525" y="128" width="420" height="96" rx="10"/>
  <text x="735" y="156" class="t" text-anchor="middle">EC2 t3.micro · Docker</text>
  <text x="735" y="180" class="s" text-anchor="middle">ReadMark (FastAPI) · SQLite</text>
  <text x="735" y="200" class="s" text-anchor="middle">Caddy → HTTPS (Let's Encrypt)</text>

  <!-- Satellites -->
  <rect class="card" x="525" y="268" width="130" height="60" rx="10"/>
  <text x="590" y="294" class="t" text-anchor="middle" font-size="13">SSM Params</text>
  <text x="590" y="312" class="lbl" text-anchor="middle">secrets</text>

  <rect class="card" x="670" y="268" width="130" height="60" rx="10"/>
  <text x="735" y="294" class="t" text-anchor="middle" font-size="13">CloudWatch</text>
  <text x="735" y="312" class="lbl" text-anchor="middle">logs · alarms · dash</text>

  <rect class="card" x="815" y="268" width="130" height="60" rx="10"/>
  <text x="880" y="294" class="t" text-anchor="middle" font-size="13">S3</text>
  <text x="880" y="312" class="lbl" text-anchor="middle">daily backups</text>

  <!-- Claude (external) -->
  <rect class="ext" x="670" y="360" width="275" height="52" rx="10"/>
  <text x="807" y="384" class="t" text-anchor="middle" font-size="13">Anthropic Claude API</text>
  <text x="807" y="401" class="lbl" text-anchor="middle">article summaries + token/cost tracking</text>

  <!-- Edges -->
  <path class="edge" d="M150,146 H195" marker-end="url(#arrow)"/>
  <text x="158" y="138" class="lbl">push</text>

  <path class="edge" d="M322,300 V330" marker-end="url(#arrow)"/>
  <text x="330" y="320" class="lbl">push image</text>

  <path class="edge" d="M450,200 H525" marker-end="url(#arrow)"/>
  <text x="458" y="192" class="lbl">deploy (SSM)</text>

  <path class="edge" d="M450,352 C490,352 500,250 525,205" marker-end="url(#arrow)"/>
  <text x="452" y="300" class="lbl">pull</text>

  <path class="edge" d="M590,268 V224" marker-end="url(#arrow)"/>
  <path class="edge" d="M735,224 V268" marker-end="url(#arrow)"/>
  <path class="edge" d="M880,224 C880,245 880,250 880,268" marker-end="url(#arrow)"/>
  <path class="edge" d="M760,224 C775,300 790,340 800,360" marker-end="url(#arrow)"/>

  <path class="edge" d="M150,470 C330,470 430,300 525,210" marker-end="url(#arrow)"/>
  <text x="250" y="430" class="lbl">HTTPS via Caddy</text>
</svg>
