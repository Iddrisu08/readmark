services:
  readmark:
    build: .
    container_name: readmark-api
    ports:
      - "8000:8000"
    volumes:
      - readmark-data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/readmark.db
    # Optional: create a .env file to override SECRET_KEY, CORS, Google OAuth, etc.
    # `required: false` lets `docker compose up` work even when no .env exists.
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  readmark-data:
